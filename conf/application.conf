# This is the main configuration file for the application.
# https://www.playframework.com/documentation/latest/ConfigFile

# Server
play.server.http.port = 8080
play.server.http.address = "0.0.0.0"

# Secret key (override in production via env var)
play.http.secret.key = "changeme"
play.http.secret.key = ${?PLAY_SECRET_KEY}

# Guice modules
play.modules.enabled += "modules.FlywayModule"

# Filters
play.filters.enabled += "play.filters.cors.CORSFilter"
play.filters.cors {
  allowedOrigins = null
  allowedHttpMethods = ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
  allowedHttpHeaders = ["Accept", "Origin", "Content-Type", "X-Requested-With", "Authorization"]
}

# Database configuration
# For Supabase use: jdbc:postgresql://db.<project-ref>.supabase.co:5432/postgres?sslmode=require
# For local dev use: jdbc:postgresql://localhost:5432/itera
db.default {
  driver = org.postgresql.Driver
  url = "jdbc:postgresql://localhost:5432/itera"
  url = ${?DB_URL}
  username = "postgres"
  username = ${?DB_USER}
  password = "postgres"
  password = ${?DB_PASSWORD}

  # HikariCP settings
  hikaricp {
    maximumPoolSize = 10
    minimumIdle = 2
    connectionTimeout = 20000
    idleTimeout = 300000
    maxLifetime = 1200000
  }
}

# Flyway migrations (executed manually via FlywayModule)
flyway {
  locations = ["db/migration"]
}

# Microservices URLs (used by API Gateway)
itera.pythonApiUrl = "http://localhost:8000"
itera.pythonApiUrl = ${?PYTHON_API_URL}
itera.prologUrl = "http://localhost:9000"
itera.prologUrl = ${?PROLOG_URL}

# JWT config
jwt.secret = "changeme-change-this-in-production-min-32-chars"
jwt.secret = ${?JWT_SECRET}
jwt.expiration-hours = 24

database {
  driver = "org.postgresql.Driver"
  driver = ${?DB_DRIVER}
  url = "jdbc:postgresql://localhost:5432/itera"
  url = ${?DB_URL}
  user = "itera"
  user = ${?DB_USER}
  password = "itera"
  password = ${?DB_PASSWORD}
  poolSize = 10
  poolSize = ${?DB_POOL_SIZE}
}

jwt {
  secret = "change-me-in-production-please-use-env-var"
  secret = ${?JWT_SECRET}
  ttlSeconds = 86400
  ttlSeconds = ${?JWT_TTL_SECONDS}
}

server {
  host = "0.0.0.0"
  host = ${?SERVER_HOST}
  port = 8080
  port = ${?SERVER_PORT}
}
